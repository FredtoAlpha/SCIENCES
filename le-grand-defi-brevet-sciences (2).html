<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Le Grand Défi Brevet — Sciences</title>
<style>
/* ============ DESIGN TOKENS ============
   Sujet : tournoi de révision DNB projeté en classe (3e). Registre "officiel"
   français (typo type signalétique DIN/Bahnschrift) posé sur un plateau de jeu
   sombre, panneaux "papier" pour le contenu, couleurs d'équipes franches.
   Polices système uniquement (aucun chargement réseau — PC du collège). */
:root{
  --stage:#0f1530; --stage-2:#18204a; --stage-edge:#070b1d;
  --panel:#f7f1e3; --panel-2:#efe7d2; --ink:#1b2030; --ink-soft:#5a5a4f;
  --line:#d8cfb4; --line-strong:#1b2030;
  --gold:#ecb73c; --gold-deep:#b9851f;
  --t1:#d6453a; --t2:#2f74c0; --t3:#34935f; --t4:#e2a317;
  --good:#34935f; --good-bg:#e2f0e6; --bad:#d6453a; --bad-bg:#f6e1dd;
  --shadow:0 14px 40px rgba(0,0,0,.35);
  --r:18px; --r-sm:11px;
  --disp:"Bahnschrift","DIN Alternate","Segoe UI Semibold","Segoe UI",system-ui,sans-serif;
  --body:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:"Consolas","SFMono-Regular","Roboto Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--body); color:var(--ink);
  background:
    radial-gradient(1200px 700px at 50% -10%, var(--stage-2), transparent 60%),
    linear-gradient(180deg, var(--stage), var(--stage-edge));
  background-attachment:fixed;
  min-height:100%; overflow-x:hidden;
}
#app{max-width:1180px;margin:0 auto;padding:16px 18px 40px;min-height:100vh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}

/* ---------- generic stage card ---------- */
.card{
  background:var(--panel); color:var(--ink);
  border-radius:var(--r); box-shadow:var(--shadow);
  border:1px solid rgba(0,0,0,.06);
  padding:26px 30px; position:relative;
}
.card.paper{
  background-image:
    linear-gradient(var(--panel),var(--panel)),
    repeating-linear-gradient(transparent,transparent 33px,#c9d6e6 33px,#c9d6e6 34px);
  background-blend-mode:normal;
}
.eyebrow{font-family:var(--disp);letter-spacing:.18em;text-transform:uppercase;font-size:.74rem;color:var(--gold-deep);font-weight:700}
h1,h2,h3{font-family:var(--disp);line-height:1.05;margin:0}
.headline{font-size:clamp(1.7rem,4.6vw,3rem);font-weight:700;letter-spacing:.01em}
.headline .pop{color:var(--t1)}
.sub{color:var(--ink-soft);font-size:1rem;margin-top:10px;max-width:60ch}

/* ---------- buttons ---------- */
.btn{
  font-family:var(--disp);font-weight:700;letter-spacing:.03em;font-size:1.05rem;
  border:none;border-radius:var(--r-sm);padding:14px 22px;color:#fff;
  background:var(--ink);box-shadow:0 5px 0 #0a0d18;transition:transform .06s, box-shadow .06s, filter .15s;
}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #0a0d18}
.btn.primary{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#241a04;box-shadow:0 5px 0 #7c5a13}
.btn.primary:active{box-shadow:0 1px 0 #7c5a13}
.btn.ghost{background:transparent;color:var(--panel);border:2px solid rgba(247,241,227,.45);box-shadow:none}
.btn.ghost:active{transform:translateY(2px)}
.btn.small{font-size:.85rem;padding:9px 14px;box-shadow:0 4px 0 #0a0d18}
.btn.small:active{box-shadow:0 1px 0 #0a0d18}
.btn[disabled]{opacity:.4;pointer-events:none}

/* ---------- HUD (top bar pendant le jeu) ---------- */
#hud{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.round-badge{font-family:var(--disp);font-weight:700;color:var(--panel);display:flex;align-items:baseline;gap:10px}
.round-badge .num{background:var(--gold);color:#241a04;border-radius:9px;padding:4px 10px;font-size:.95rem;letter-spacing:.06em}
.round-badge .nm{font-size:1.15rem;letter-spacing:.02em}
.hud-spacer{flex:1}
.timer{font-family:var(--mono);font-weight:700;font-size:1.5rem;color:var(--panel);min-width:64px;text-align:center;
  background:rgba(0,0,0,.28);border-radius:10px;padding:4px 12px;border:1px solid rgba(255,255,255,.12)}
.timer.warn{color:#ffd27a}
.timer.crit{color:#ff8a7a;animation:pulse .6s infinite alternate}
@keyframes pulse{to{transform:scale(1.08)}}
.timer-bar{height:7px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden;width:100%;margin-bottom:14px}
.timer-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--t1));width:100%;transition:width .25s linear}

/* ---------- scoreboard ---------- */
.board{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.team-chip{flex:1 1 0;min-width:120px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:13px;padding:10px 12px;color:var(--panel);position:relative;overflow:hidden;transition:transform .15s, box-shadow .15s}
.team-chip .bar{position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c)}
.team-chip .nm{font-family:var(--disp);font-weight:700;letter-spacing:.02em;font-size:1rem;padding-left:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-chip .sc{font-family:var(--disp);font-weight:700;font-size:1.7rem;padding-left:6px;line-height:1}
.team-chip.active{box-shadow:0 0 0 2px var(--c), 0 10px 24px rgba(0,0,0,.35);transform:translateY(-3px);background:rgba(255,255,255,.12)}
.team-chip.active::after{content:"À TOI";position:absolute;right:8px;top:8px;font-family:var(--disp);font-size:.6rem;letter-spacing:.12em;background:var(--c);color:#fff;padding:2px 6px;border-radius:6px}
.turn-banner{font-family:var(--disp);font-weight:700;letter-spacing:.02em;color:var(--ink);font-size:1.15rem;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.turn-dot{width:16px;height:16px;border-radius:50%;background:var(--c);display:inline-block;box-shadow:0 0 0 4px color-mix(in srgb,var(--c) 30%, transparent)}

/* ---------- question / choices ---------- */
.qmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-family:var(--disp);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  padding:4px 9px;border-radius:7px;background:var(--panel-2);color:var(--ink-soft);border:1px solid var(--line)}
.tag.mat{color:#fff}
.tag.mat.H{background:#9a3b30}.tag.mat.G{background:#1f6aa8}.tag.mat.E{background:#5a4a86}
.qtext{font-family:var(--disp);font-weight:700;font-size:clamp(1.3rem,2.8vw,1.9rem);line-height:1.2;margin:4px 0 20px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.choices{grid-template-columns:1fr}}
.choice{
  text-align:left;background:#fff;color:var(--ink);border:2px solid var(--line);
  border-radius:13px;padding:15px 16px 15px 52px;font-size:1.05rem;font-family:var(--body);
  position:relative;box-shadow:0 3px 0 rgba(0,0,0,.06);line-height:1.3;transition:border-color .12s, transform .08s, background .12s}
.choice:hover{border-color:var(--gold);transform:translateY(-1px)}
.choice .key{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:8px;
  background:var(--ink);color:#fff;font-family:var(--disp);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:1rem}
.choice.good{background:var(--good-bg);border-color:var(--good)}
.choice.good .key{background:var(--good)}
.choice.bad{background:var(--bad-bg);border-color:var(--bad);text-decoration:line-through;opacity:.85}
.choice.bad .key{background:var(--bad)}
.choice[disabled]{cursor:default}
.explain{margin-top:16px;border-left:5px solid var(--good);background:#eef5ef;border-radius:0 12px 12px 0;padding:13px 16px;font-size:1rem;line-height:1.45}
.explain.ko{border-left-color:var(--bad);background:#f8ece9}
.explain b{font-family:var(--disp);letter-spacing:.02em}
.feedback-line{font-family:var(--disp);font-weight:700;font-size:1.15rem;margin-bottom:4px}
.gain{color:var(--good)} .nogain{color:var(--ink-soft)}

/* ---------- launch / setup ---------- */
.hero-wrap{display:flex;flex-direction:column;gap:18px;justify-content:center;flex:1}
.kbd{font-family:var(--mono);background:#fff;border:1px solid var(--line);border-bottom-width:3px;border-radius:6px;padding:1px 7px;font-size:.85rem;color:var(--ink)}
.setup-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;align-items:start}
@media(max-width:820px){.setup-grid{grid-template-columns:1fr}}
.team-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.team-row .swatch{width:26px;height:26px;border-radius:8px;background:var(--c);flex:none;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
.team-row input{flex:1;font-family:var(--disp);font-weight:700;font-size:1.05rem;color:var(--ink);
  border:2px solid var(--line);border-radius:10px;padding:9px 12px;background:#fff}
.team-row input:focus{outline:none;border-color:var(--gold)}
.counter{display:flex;align-items:center;gap:8px}
.counter button{width:40px;height:40px;border-radius:10px;border:2px solid var(--line);background:#fff;font-family:var(--disp);font-size:1.3rem;font-weight:700;color:var(--ink)}
.counter .val{font-family:var(--disp);font-weight:700;font-size:1.4rem;min-width:28px;text-align:center}
.rounds-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.round-toggle{display:flex;align-items:center;gap:12px;padding:11px 14px;border:2px solid var(--line);border-radius:12px;background:#fff;text-align:left;color:var(--ink);transition:border-color .12s, background .12s}
.round-toggle .ic{font-size:1.4rem;flex:none}
.round-toggle .tt{font-family:var(--disp);font-weight:700;font-size:1.02rem}
.round-toggle .ds{font-size:.82rem;color:var(--ink-soft)}
.round-toggle .chk{margin-left:auto;width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--disp);color:#fff;font-weight:700}
.round-toggle.on{border-color:var(--good);background:#f1f8f3}
.round-toggle.on .chk{background:var(--good);border-color:var(--good)}

/* ---------- maps ---------- */
.map-prompt{font-family:var(--disp);font-weight:700;font-size:clamp(1.2rem,2.6vw,1.7rem);margin-bottom:12px}
.map-prompt .what{color:var(--t1)}
.mapwrap{background:#fbf7ec;border-radius:14px;border:2px solid var(--line-strong);overflow:hidden;position:relative}
.mapwrap svg{display:block;width:100%;height:auto;touch-action:manipulation}
.land{fill:var(--panel-2);stroke:#9a9482;stroke-width:.6;stroke-linejoin:round}
.coast{fill:var(--panel-2);stroke:#3a3328;stroke-width:1.1;stroke-linejoin:round}
.country{fill:var(--panel-2);stroke:#9a9482;stroke-width:.6;cursor:pointer;transition:fill .1s}
.country:hover{fill:#fff0c9}
.country.good{fill:var(--good);stroke:#1f5e3c}
.country.bad{fill:var(--bad);stroke:#7c241b}
.country.lock{pointer-events:none}
.pin{cursor:pointer}
.pin .dot{fill:#fff;stroke:var(--ink);stroke-width:2;transition:fill .1s, r .1s}
.pin:hover .dot{fill:#ffe39a;r:13}
.pin.good .dot{fill:var(--good);stroke:#1f5e3c}
.pin.bad .dot{fill:var(--bad);stroke:#7c241b}
.pin.lock{pointer-events:none}
.pin text{font-family:var(--disp);font-weight:700;font-size:13px;fill:var(--ink);paint-order:stroke;stroke:#fff;stroke-width:3.5px;stroke-linejoin:round;pointer-events:none}
.map-progress{font-family:var(--disp);color:var(--ink-soft);font-size:.92rem;margin-top:10px;text-align:center}

/* ---------- frise / ordering ---------- */
.seq-instruction{font-family:var(--disp);font-weight:700;font-size:1.15rem;margin-bottom:14px}
.seq-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.seq-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:12px 14px;font-family:var(--body);
  font-size:1rem;flex:1 1 150px;min-width:140px;text-align:center;position:relative;box-shadow:0 3px 0 rgba(0,0,0,.06);transition:transform .08s, border-color .12s}
.seq-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.seq-card[disabled]{opacity:.35;pointer-events:none}
.seq-card .order-badge{position:absolute;top:-10px;left:-10px;width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-family:var(--disp);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.seq-slots{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.seq-slot{flex:1 1 100px;min-width:90px;border:2px dashed var(--line);border-radius:10px;min-height:54px;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;font-size:.9rem;color:var(--ink-soft);font-family:var(--body)}
.seq-slot.filled{border-style:solid;background:#fff;color:var(--ink)}
.seq-slot.right{border-color:var(--good);background:var(--good-bg)}
.seq-slot.wrong{border-color:var(--bad);background:var(--bad-bg)}
.seq-slot .yr{font-family:var(--disp);font-weight:700;font-size:.95rem;display:block;margin-top:3px}

/* ---------- match (relier) ---------- */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:640px){.match-grid{gap:12px}}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-item{background:#fff;border:2px solid var(--line);border-radius:11px;padding:12px 14px;font-size:1rem;text-align:left;transition:border-color .1s, background .1s;position:relative}
.match-item:hover{border-color:var(--gold)}
.match-item.sel{border-color:var(--gold);background:#fff7e3;box-shadow:0 0 0 2px var(--gold)}
.match-item.done{border-color:var(--good);background:var(--good-bg);pointer-events:none}
.match-item.done::after{content:"✓";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--good);font-weight:700}

/* ---------- DC kit ---------- */
.dc-sujet{background:var(--panel-2);border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--line)}
.dc-sujet .verbe{display:inline-block;font-family:var(--disp);font-weight:700;background:var(--t1);color:#fff;border-radius:7px;padding:2px 10px;letter-spacing:.05em;margin-bottom:6px;font-size:.8rem;text-transform:uppercase}
.dc-sujet .txt{font-family:var(--disp);font-weight:700;font-size:1.2rem;line-height:1.25}
.idea{display:flex;gap:10px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:9px}
.idea .lbl{flex:1;font-size:1rem;line-height:1.3}
.idea .acts{display:flex;gap:6px;flex:none}
.idea .acts button{font-family:var(--disp);font-weight:700;font-size:.8rem;border:2px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;color:var(--ink)}
.idea.ok{border-color:var(--good);background:var(--good-bg)}
.idea.no{border-color:var(--bad);background:var(--bad-bg)}
.idea .verdict{font-family:var(--disp);font-weight:700;font-size:.8rem;padding:4px 8px;border-radius:7px}
.idea.ok .verdict{color:var(--good)} .idea.no .verdict{color:var(--bad)}

/* ---------- wager (boss) ---------- */
.wager-box{text-align:center}
.wager-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.wager-chip{font-family:var(--disp);font-weight:700;font-size:1.2rem;border:2px solid var(--line);background:#fff;border-radius:12px;padding:14px 22px;color:var(--ink);min-width:90px}
.wager-chip:hover{border-color:var(--gold)}
.wager-chip.allin{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#241a04;border-color:var(--gold-deep)}
.wager-note{color:var(--ink-soft);font-size:.92rem}

/* ---------- podium / bilan ---------- */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:14px;margin:26px 0 10px;flex-wrap:wrap}
.pod{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod .crown{font-size:1.8rem}
.pod .block{border-radius:14px 14px 0 0;width:130px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;color:#fff;padding:12px 8px;box-shadow:var(--shadow)}
.pod .block .nm{font-family:var(--disp);font-weight:700;font-size:1.05rem;text-align:center;line-height:1.1}
.pod .block .sc{font-family:var(--disp);font-weight:700;font-size:2rem;line-height:1}
.pod .rank{font-family:var(--disp);font-weight:700;color:var(--panel);font-size:.85rem}
.pod.p1 .block{height:170px;background:linear-gradient(180deg,var(--gold),var(--gold-deep))}
.pod.p1 .block .nm,.pod.p1 .block .sc{color:#241a04}
.pod.p2 .block{height:128px;background:#9aa4b8}
.pod.p3 .block{height:100px;background:#b08457}
.review{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
@media(max-width:760px){.review{grid-template-columns:1fr}}
.review .col h3{font-size:1.05rem;margin-bottom:8px;color:var(--ink)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-row .nm{flex:1 1 40%;font-size:.92rem}
.bar-row .track{flex:1 1 50%;height:14px;border-radius:99px;background:#e6ddc6;overflow:hidden}
.bar-row .track > i{display:block;height:100%;border-radius:99px}
.bar-row .pc{font-family:var(--disp);font-weight:700;font-size:.85rem;min-width:42px;text-align:right}
.niveau{display:inline-block;font-family:var(--disp);font-weight:700;border-radius:8px;padding:3px 10px;font-size:.85rem;color:#fff}

/* ---------- overlay (help / pause / reveal) ---------- */
.overlay{position:fixed;inset:0;background:rgba(7,11,29,.72);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay .sheet{max-width:560px;width:100%}
.overlay .sheet h2{margin-bottom:12px}
.shortcuts{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;font-size:.95rem;align-items:center}

/* ---------- misc ---------- */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;align-items:center}
.toolbar .hud-spacer{min-width:10px}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:60}
.center{text-align:center}
.mt{margin-top:16px}
.muted{color:var(--ink-soft)}
.foot{margin-top:auto;padding-top:18px;text-align:center;color:rgba(247,241,227,.5);font-size:.8rem}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
.mode-card{display:flex;flex-direction:column;gap:6px;text-align:left;align-items:flex-start;cursor:pointer;border:1px solid rgba(0,0,0,.06);transition:transform .12s, box-shadow .12s;width:100%}
.mode-card:hover{transform:translateY(-4px);box-shadow:0 22px 50px rgba(0,0,0,.42)}
.mode-go{font-family:var(--disp);font-weight:700;color:var(--gold-deep);margin-top:8px;letter-spacing:.02em}
.team-chip.solo{flex:1}
.solo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:14px}
.solo-tile{gap:2px}
.solo-tile .sub{font-size:.85rem;margin-top:2px}
.tag.mat.M{background:#7a3f9e}.tag.mat.E{background:#2f74c0}.tag.mat.F{background:#b8602a}.tag.mat.V{background:#2f8f6b}.tag.mat.T{background:#9a7b1f}
.schema-title{text-align:center;font-family:var(--disp);font-weight:700;color:var(--ink);margin:2px 0 8px;font-size:1.05rem}
svg.schema{display:block;width:100%;max-width:460px;height:auto;margin:0 auto;background:#fbf7ec;border-radius:10px}
svg.schema .wire{stroke:#1b2030;stroke-width:4;fill:none}
svg.schema .glyph{stroke:#1b2030;stroke-width:3;fill:none}
svg.schema .pin{cursor:pointer}
svg.schema .pin .dot{fill:#fff;stroke:#1b2030;stroke-width:2.5}
svg.schema .pin:hover .dot{fill:#fff6df;stroke:var(--gold)}
svg.schema .pin.good .dot{fill:var(--good);stroke:#1f5e3c}
svg.schema .pin.bad .dot{fill:var(--bad);stroke:#7c241b}
svg.schema .pinlab{font-family:var(--disp);font-weight:700;font-size:14px;fill:#1b2030;paint-order:stroke;stroke:#fbf7ec;stroke-width:3px}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.appver{position:fixed;right:12px;bottom:12px;z-index:99999;background:#1b2030;color:#f4e4bf;border:2px solid #c79a3a;border-radius:999px;padding:6px 14px;font:700 13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.3px;box-shadow:0 4px 14px rgba(0,0,0,.35);opacity:.96}
</style>
</head>
<body>
<div class="appver" id="appver">v3</div>
<div id="app"></div>
<canvas class="confetti hidden" id="confetti"></canvas>
<script>
/* ====================================================================
   LE GRAND DÉFI BREVET — moteur de jeu (vanilla JS, 100% hors-ligne)

"use strict";

/* ---------- Web Audio (synthétisé, aucun fichier) ---------- */
var AC=null, audioOn=true;
function initAudio(){ if(AC)return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
function beep(freq,start,dur,type,vol){
  if(!AC||!audioOn)return;
  try{
    var o=AC.createOscillator(), g=AC.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    o.connect(g); g.connect(AC.destination);
    var t=AC.currentTime+(start||0);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}

/* ---------- Confettis (canvas, hand-codé) ---------- */
var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function confetti(){
  if(reduce)return;
  var cv=document.getElementById("confetti"); cv.classList.remove("hidden");
  var ctx=cv.getContext("2d"); cv.width=innerWidth; cv.height=innerHeight;
  var cols=["#ecb73c","#d6453a","#2f74c0","#34935f","#ffffff"]; var P=[];
  for(var i=0;i<150;i++)P.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.4,
    vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,s:5+Math.random()*7,
    c:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*Math.PI,vr:(Math.random()-0.5)*0.3});
  var t0=performance.now();
  function frame(t){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<P.length;i++){var p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.r+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();}
    if(t-t0<3200)requestAnimationFrame(frame); else {ctx.clearRect(0,0,cv.width,cv.height);cv.classList.add("hidden");}
  }
  requestAnimationFrame(frame);
}

  team.tot++; if(correct)team.ok++;
  if(item&&item.theme){ var th=team.byTheme[item.theme]||{ok:0,tot:0}; th.tot++; if(correct)th.ok++; team.byTheme[item.theme]=th; }
  if(item&&item.comp){ var c=team.byComp[item.comp]||{ok:0,tot:0}; c.tot++; if(correct)c.ok++; team.byComp[item.comp]=c; }
}

  if(e.key==="?"||(e.key==="/"&&e.shiftKey)){ e.preventDefault(); toggleHelp(); return; }
  if(e.key==="Escape"){ var o=$(".overlay"); if(o){o.remove();return;} }
  var ov=$(".overlay"); if(ov)return;
  if(e.key===" "||e.code==="Space"){ if(IC.primary){ e.preventDefault(); IC.primary(); } return; }
  if(/^[1-9]$/.test(e.key)){ var idx=parseInt(e.key,10)-1; if(IC.selects[idx]){ e.preventDefault(); IC.selects[idx](); } return; }
  if(e.key==="t"||e.key==="T"){ if(game&&game.ri>=0){ rotate(); renderHUD(); } return; }
  if(e.key==="n"||e.key==="N"){ if(game&&game.ri>=0) confirmSkipRound(); return; }
});

/* ---------- Timer ---------- */
var timer={ id:null, total:0, left:0, onEnd:null };
function startTimer(sec,onEnd){
  stopTimer();
  var tm=$("#timer"), tb=$("#timerBar");
  if(tm)tm.classList.remove("hidden"); if(tb)tb.classList.remove("hidden");
  timer.total=sec; timer.left=sec; timer.onEnd=onEnd;
  paintTimer();
  timer.id=setInterval(function(){
    timer.left--; paintTimer();
    if(timer.left<=5&&timer.left>0)sTick();
    if(timer.left<=0){ stopTimer(); if(timer.onEnd)timer.onEnd(); }
  },1000);
}
function paintTimer(){
  var tm=$("#timer"), tb=$("#timerBar");
  if(tm){ tm.textContent=timer.left+"s"; tm.className="timer"+(timer.left<=10&&timer.left>5?" warn":"")+(timer.left<=5?" crit":""); }
  if(tb){ var f=Math.max(0,timer.left/timer.total*100); $("i",tb).style.width=f+"%"; }
}
function stopTimer(){ if(timer.id){clearInterval(timer.id);timer.id=null;} var tm=$("#timer"),tb=$("#timerBar"); if(tm)tm.classList.add("hidden"); if(tb)tb.classList.add("hidden"); }
function timerFrac(){ return timer.total?Math.max(0,timer.left/timer.total):0; }

   CARTE QCM générique (sprint, EMC, boss)
   ==================================================================== */
function renderQCM(cfg){
  resetIC();
  var content=$("#content"); clear(content);
  var card=elt("div","card");
  card.appendChild(turnBanner());

  if(cfg.tags&&cfg.tags.length){
    var meta=elt("div","qmeta");
    for(var i=0;i<cfg.tags.length;i++){ var tg=cfg.tags[i]; meta.appendChild(elt("span","tag "+(tg.cls||""),tg.txt)); }
    card.appendChild(meta);
  }
  if(cfg.context){ var ctx=elt("div","dc-sujet"); ctx.innerHTML='<div class="txt" style="font-size:1.05rem">'+esc(cfg.context)+'</div>'; card.appendChild(ctx); }
  card.appendChild(elt("div","qtext",esc(cfg.question)));

  var grid=elt("div","choices"); var btns=[];
  for(var i=0;i<cfg.choices.length;i++){
    (function(i){
      var b=elt("button","choice");
      b.innerHTML='<span class="key">'+(i+1)+'</span>'+esc(cfg.choices[i]);
      b.onclick=function(){ resolve(i); };
      grid.appendChild(b); btns.push(b);
      IC.selects[i]=function(){ if(!resolved)resolve(i); };
    })(i);
  }
  card.appendChild(grid);
  var fb=elt("div"); fb.id="fb"; card.appendChild(fb);
  content.appendChild(card);
  content.appendChild(toolbar("Sauter la question"));

  var resolved=false;
  if(cfg.timed){ startTimer(cfg.sec,function(){ if(!resolved)resolve(-1); }); }

  IC.primary=function(){ if(!resolved)resolve(-1); };

  function resolve(chosen){
    if(resolved)return; resolved=true; stopTimer();
    var correct=(chosen===cfg.answer);
    var pts=0;
    if(correct){ pts=cfg.base; if(cfg.speed){ pts+=Math.round(10*timerFrac()); } }
    if(!correct&&cfg.lossOnWrong){ pts=-cfg.base; }
    for(var i=0;i<btns.length;i++){ btns[i].setAttribute("disabled","disabled"); }
    btns[cfg.answer].className="choice good";
    if(chosen>=0&&!correct)btns[chosen].className="choice bad";
    if(correct)sGood(); else sBad();

    var fbox=$("#fb"); clear(fbox);
    var line=elt("div","feedback-line "+(correct?"gain":"nogain"));
    if(chosen===-1)line.innerHTML="⏱ Temps écoulé — "+(pts<0?(pts+" pts"):"0 pt");
    else if(correct)line.innerHTML="✅ Bonne réponse  ·  +"+pts+" pts";
    else line.innerHTML="❌ Raté"+(cfg.lossOnWrong?("  ·  "+pts+" pts"):"  ·  0 pt");
    fbox.appendChild(line);
    if(game.showExp&&cfg.exp){ var ex=elt("div","explain"+(correct?"":" ko")); ex.innerHTML=(cfg.principe?('<b>'+esc(cfg.principe)+'.</b> '):'')+esc(cfg.exp); fbox.appendChild(ex); }

    addScore(activeTeam(),pts); bumpScore();
    record(activeTeam(),cfg.item,correct);

    IC.selects=[];
    IC.primary=function(){ cfg.onDone(correct,pts); };
    var cont=elt("button","btn primary mt",cfg.lastOne?"Voir le classement  🏁":"Continuer  ▶");
    cont.onclick=function(){ cfg.onDone(correct,pts); };
    fbox.appendChild(cont);
  }
}

var RUNNERS={};

  var qs=pick(QUIZ,Math.min(8,QUIZ.length));

      timed:!game.solo, sec:25, base:q.diff*10, speed:!game.solo,
      onDone:function(){ k++; rotate(); renderHUD(); step(); }
    });
  }
  step();
};

/* ====================================================================

   ==================================================================== */
RUNNERS.boss=function(){
  /* questions difficiles, mélangées */
  var pool=shuffle(QUIZ.filter(function(q){return q.diff>=2;}));
  if(pool.length<game.teams.length*2) pool=shuffle(QUIZ);
  var turns=game.teams.length*2; /* 2 tours par équipe */
  var k=0;
  function step(){
    if(k>=turns||k>=pool.length){ nextRound(); return; }
    askWager(pool[k], k===Math.min(turns,pool.length)-1);
  }
  function askWager(q,last){
    resetIC();
    var t=activeTeam();
    var content=$("#content"); clear(content);
    var card=elt("div","card wager-box");
    card.appendChild(turnBanner());
    card.innerHTML+='<div class="eyebrow">Le tapis final</div>'+
      '<h2 class="headline" style="font-size:1.9rem">'+esc(t.name)+', combien tu mises ?</h2>'+
      '<p class="wager-note">Score actuel : <b>'+t.score+' pts</b>. Bonne réponse = tu gagnes ta mise. Mauvaise = tu la perds.</p>';
    var opts=elt("div","wager-opts");
    var choices=[10,20,40].filter(function(v){return v<=Math.max(10,t.score)||true;});
    choices.forEach(function(v){
      var b=elt("button","wager-chip",v+" pts");
      b.onclick=function(){ play(q,v,last); };
      opts.appendChild(b);
    });
    var allin=elt("button","wager-chip allin","TAPIS  ·  "+Math.max(10,t.score)+" pts");
    allin.onclick=function(){ play(q,Math.max(10,t.score),last); };
    opts.appendChild(allin);
    card.appendChild(opts);
    content.appendChild(card);
    content.appendChild(toolbar("Mise 10 par défaut"));
    sWager();
    IC.primary=function(){ play(q,10,last); };
  }
  function play(q,wager,last){
    renderQCM({
      item:q,
      tags:[{cls:"mat "+q.mat,txt:MAT_LABEL[q.mat]},{txt:"Mise : "+wager+" pts"}],
      question:q.q, choices:q.c, answer:q.a, exp:q.e,
      timed:true, sec:30, base:wager, speed:false, lossOnWrong:true, lastOne:last,
      onDone:function(){ k++; rotate(); renderHUD(); step(); }
    });
  }
  step();
};

/* ====================================================================
   MANCHE 3 — FRISE CHRONO (ordre) + RELIER
   ==================================================================== */
RUNNERS.frise=function(){
  var sets=pick(FRISE,Math.min(2,FRISE.length));
  var matchSet=pick(MATCH,1)[0];
  var tasks=[];
  sets.forEach(function(s){ tasks.push({type:"order",set:s}); });
  tasks.push({type:"match",set:matchSet});
  var ti=0;
  function step(){ if(ti>=tasks.length){ nextRound(); return; } var t=tasks[ti]; if(t.type==="order")orderTask(t.set,after); else matchTask(t.set,after); }
  function after(){ ti++; rotate(); renderHUD(); step(); }
  step();
};
function orderTask(set,done){
  resetIC(); renderHUD();
  var content=$("#content"); clear(content);
  var card=elt("div","card");
  card.appendChild(turnBanner());
  card.appendChild(elt("div","seq-instruction","📊 "+esc(set.titre)));
  var slots=elt("div","seq-slots"); var slotEls=[];
  for(var i=0;i<set.ev.length;i++){ var sl=elt("div","seq-slot","place "+(i+1)); slots.appendChild(sl); slotEls.push(sl); }
  card.appendChild(slots);
  var row=elt("div","seq-row"); var cardEls=[];
  var order=[]; /* indices placés */
  var shuffled=shuffle(set.ev.map(function(e,i){return i;}));
  shuffled.forEach(function(idx){
    var b=elt("button","seq-card",esc(set.ev[idx].t));
    b.onclick=function(){ placeCard(idx,b); };
    row.appendChild(b); cardEls[idx]=b;
  });
  card.appendChild(row);
  var fb=elt("div"); fb.id="fb2"; card.appendChild(fb);
  var valid=elt("button","btn primary mt","Valider la frise"); valid.setAttribute("disabled","disabled");
  valid.onclick=check; card.appendChild(valid);
  content.appendChild(card);
  content.appendChild(toolbar("Valider"));
  var answered=false;
  IC.primary=function(){ if(!answered){ if(order.length===set.ev.length)check(); } };

  function placeCard(idx,btn){
    if(answered)return;
    order.push(idx); btn.setAttribute("disabled","disabled");
    var pos=order.length-1;
    slotEls[pos].className="seq-slot filled";
    slotEls[pos].innerHTML='<span class="order-badge" style="position:static;display:inline-flex;margin-right:4px">'+order.length+'</span> '+esc(set.ev[idx].t);
    slotEls[pos].onclick=function(){ if(answered)return; if(pos===order.length-1){ order.pop(); cardEls[idx].removeAttribute("disabled"); slotEls[pos].className="seq-slot"; slotEls[pos].textContent="place "+(pos+1); slotEls[pos].onclick=null; valid.setAttribute("disabled","disabled"); } };
    if(order.length===set.ev.length) valid.removeAttribute("disabled");
  }
  function check(){
    if(answered)return; answered=true;
    var correctOrder=set.ev.map(function(e,i){return i;}).sort(function(a,b){return set.ev[a].d-set.ev[b].d;});
    var good=0;
    for(var p=0;p<order.length;p++){
      var ok=(order[p]===correctOrder[p]);
      if(ok)good++;
      slotEls[p].className="seq-slot "+(ok?"right":"wrong");
      slotEls[p].innerHTML=esc(set.ev[order[p]].t);
    }
    valid.setAttribute("disabled","disabled");
    var pts=good*8;
    addScore(activeTeam(),pts); bumpScore();
    record(activeTeam(),{theme:"Ranger / ordonner",comp:"Notion"},good===set.ev.length);
    if(good===set.ev.length)sGood(); else sBad();
    var fbx=$("#fb2");

function matchTask(set,done){
  resetIC(); renderHUD();
  var content=$("#content"); clear(content);
  var card=elt("div","card");
  card.appendChild(turnBanner());
  card.appendChild(elt("div","seq-instruction","🔗 "+esc(set.titre)));
  var grid=elt("div","match-grid");
  var left=elt("div","match-col"), right=elt("div","match-col");
  var dates=shuffle(set.pairs.map(function(p){return p[0];}));
  var events=shuffle(set.pairs.map(function(p){return p[1];}));
  var sel=null, done2=0;
  dates.forEach(function(d){ var b=elt("button","match-item",esc(d)); b.dataset.k=d; b.onclick=function(){ selectLeft(b); }; left.appendChild(b); });
  events.forEach(function(e){ var b=elt("button","match-item",esc(e)); b.dataset.k=e; b.onclick=function(){ selectRight(b); }; right.appendChild(b); });
  grid.appendChild(left); grid.appendChild(right);

  var fb=elt("div"); fb.id="fb3"; card.appendChild(fb);
  content.appendChild(card);
  content.appendChild(toolbar("Terminer"));

  function selectLeft(b){ if(b.classList.contains("done"))return; if(sel)sel.classList.remove("sel"); sel=b; b.classList.add("sel"); }
  function selectRight(b){
    if(b.classList.contains("done")||!sel)return;
    var d=sel.dataset.k, e=b.dataset.k;
    var ok=false; for(var i=0;i<set.pairs.length;i++){ if(set.pairs[i][0]===d&&set.pairs[i][1]===e){ok=true;break;} }
    if(ok){ sel.classList.remove("sel"); sel.classList.add("done"); b.classList.add("done"); sGood(); addScore(activeTeam(),8); bumpScore(); done2++; sel=null; if(done2===set.pairs.length)finish(); }
    else { sBad(); b.classList.add("bad"); var bb=b; setTimeout(function(){bb.classList.remove("bad");},500); sel.classList.remove("sel"); sel=null; }
  }
  var finished=false;
  function finish(){
    if(finished)return; finished=true;
    record(activeTeam(),{theme:"Relier (grandeurs, organes)",comp:"Notion"},done2===set.pairs.length);

RUNNERS.cartes=function(){
  var chosen=shuffle(DIAGRAMS.slice()).slice(0,2);
  var prompts=[];
  chosen.forEach(function(d){ shuffle(d.asks.slice()).slice(0,3).forEach(function(a){ prompts.push({d:d,zone:a.zone,label:a.label}); }); });
  prompts=prompts.slice(0,5);

  var sub=elt("div","eyebrow"); sub.style.marginBottom="4px"; sub.textContent="Schéma à légender"; card.appendChild(sub);
  var promptEl=elt("div","map-prompt"); card.appendChild(promptEl);
  var titleEl=elt("div","schema-title"); card.appendChild(titleEl);
  var wrap=elt("div","mapwrap"); card.appendChild(wrap);
  var prog=elt("div","map-progress"); card.appendChild(prog);
  var fb=elt("div"); fb.id="fbm"; card.appendChild(fb);
  content.appendChild(card);
  content.appendChild(toolbar("Passer ce schéma"));

  function label(svg,zone,cls){
    var pin=svg.querySelector('.pin[data-zone="'+zone+'"]'); if(!pin)return;
    pin.setAttribute("class","pin "+cls);
    var dot=pin.querySelector(".dot"); var cx=+dot.getAttribute("cx"), cy=+dot.getAttribute("cy");
    var ns="http://www.w3.org/2000/svg"; var t=document.createElementNS(ns,"text");
    t.setAttribute("x",cx); t.setAttribute("y",cy-14); t.setAttribute("text-anchor","middle"); t.setAttribute("class","pinlab");
    t.textContent=zoneName(zone); svg.appendChild(t);
  }
  function lock(svg){ var p=svg.querySelectorAll(".pin"); for(var i=0;i<p.length;i++) p[i].onclick=null; }
  function ask(){
    if(pi>=prompts.length){ nextRound(); return; }
    resetIC(); answered=false; clear($("#fbm")); setTurn();
    var pr=prompts[pi];
    titleEl.textContent=pr.d.title;
    prog.textContent="Schéma "+(pi+1)+" / "+prompts.length;
    promptEl.innerHTML='Clique sur <span class="what">'+esc(pr.label)+'</span>';
    wrap.innerHTML=pr.d.svg;
    var svg=$("svg",wrap);
    var pins=svg.querySelectorAll(".pin");
    for(var i=0;i<pins.length;i++){ (function(pin){ pin.onclick=function(){ if(answered)return; pick(pin.getAttribute("data-zone"),pin,svg,pr); }; })(pins[i]); }
    IC.primary=function(){ if(!answered) skip(svg,pr); };
  }
  function pick(zone,pin,svg,pr){
    answered=true; lock(svg);
    var ok=(zone===pr.zone);
    if(ok){ label(svg,pr.zone,"good"); finish(true,""); }
    else { pin.setAttribute("class","pin bad"); label(svg,pr.zone,"good"); finish(false,"il fallait cliquer sur "+pr.label); }
  }
  function skip(svg,pr){ answered=true; lock(svg); label(svg,pr.zone,"good"); finish(false,"il fallait cliquer sur "+pr.label); }
  function finish(correct,msg){
    addScore(activeTeam(),correct?12:0); bumpScore();
    record(activeTeam(),{theme:"Schéma à légender",comp:"Légender"},correct);
    if(correct)sGood(); else sBad();
    var fbx=$("#fbm");
    var line=elt("div","feedback-line "+(correct?"gain":"nogain"));
    line.innerHTML=correct?"✅ Exact  ·  +12 pts":"❌ Raté — "+esc(msg);
    fbx.appendChild(line);
    var cont=elt("button","btn primary mt","Continuer  ▶"); cont.onclick=function(){ pi++; rotate(); renderHUD(); ask(); }; fbx.appendChild(cont);
    resetIC(); IC.primary=cont.onclick;
  }
  ask();
};

function niveau(p){
  if(p>=85)return{l:"Expert",c:"#34935f"};
  if(p>=70)return{l:"Solide",c:"#2f74c0"};
  if(p>=50)return{l:"Correct",c:"#e2a317"};
  return{l:"Fragile",c:"#d6453a"};
}
function barColor(p){ return p>=70?"#34935f":(p>=50?"#e2a317":"#d6453a"); }
function showBilan(){
  if(game.solo){ renderSoloBilan(); return; }
  stopTimer(); resetIC();
  var a=app(); clear(a);
  var ranked=game.teams.slice().sort(function(x,y){return y.score-x.score;});

  var head=elt("div","card center");
  head.innerHTML='<div class="eyebrow">Fin du défi</div><h1 class="headline">Classement final</h1>';
  /* podium */
  var pod=elt("div","podium");
  var orderPod=[]; if(ranked[1])orderPod.push({t:ranked[1],r:2,cls:"p2"}); orderPod.push({t:ranked[0],r:1,cls:"p1"}); if(ranked[2])orderPod.push({t:ranked[2],r:3,cls:"p3"});
  orderPod.forEach(function(o){
    var d=elt("div","pod "+o.cls);
    d.innerHTML=(o.r===1?'<div class="crown">👑</div>':'')+
      '<div class="block" style="'+(o.cls!=="p1"?"":"")+'"><div class="nm">'+esc(o.t.name)+'</div><div class="sc">'+o.t.score+'</div></div>'+
      '<div class="rank">'+o.r+(o.r===1?"er":"e")+'</div>';
    if(o.cls!=="p1"&&o.cls!=="p2"&&o.cls!=="p3"){}
    pod.appendChild(d);
  });
  head.appendChild(pod);
  /* équipes restantes (4e) */
  if(ranked.length>3){
    var rest=elt("p","muted center");
    rest.textContent=ranked.slice(3).map(function(t,i){return (i+4)+"e — "+t.name+" ("+t.score+" pts)";}).join("   ·   ");
    head.appendChild(rest);
  }
  a.appendChild(head);

  /* bilan pédagogique */
  var classTheme={};
  game.teams.forEach(function(t){ for(var k in t.byTheme){ var s=classTheme[k]||{ok:0,tot:0}; s.ok+=t.byTheme[k].ok; s.tot+=t.byTheme[k].tot; classTheme[k]=s; } });
  var themeArr=[]; for(var k in classTheme){ themeArr.push({nm:k,pc:Math.round(classTheme[k].ok/classTheme[k].tot*100),tot:classTheme[k].tot}); }
  themeArr.sort(function(x,y){return x.pc-y.pc;});

  var rev=elt("div","card");
  rev.innerHTML='<div class="eyebrow">Bilan de la classe</div><h2 class="headline" style="font-size:1.6rem">Ce qu\'il faut revoir</h2>';
  if(themeArr.length===0){ rev.appendChild(elt("p","muted","Aucune donnée enregistrée sur cette partie.")); }
  else{
    var grid=elt("div","review");
    var col1=elt("div","col"); col1.innerHTML='<h3>Réussite par thème</h3>';
    themeArr.forEach(function(o){
      var row=elt("div","bar-row");
      row.innerHTML='<span class="nm">'+esc(o.nm)+'</span><span class="track"><i style="width:'+o.pc+'%;background:'+barColor(o.pc)+'"></i></span><span class="pc" style="color:'+barColor(o.pc)+'">'+o.pc+'%</span>';
      col1.appendChild(row);
    });
    var col2=elt("div","col"); col2.innerHTML='<h3>Niveau DNB par équipe</h3>';
    ranked.forEach(function(t){
      var p=t.tot?Math.round(t.ok/t.tot*100):0; var nv=niveau(p);
      var row=elt("div","bar-row");
      row.innerHTML='<span class="nm" style="font-weight:600">'+esc(t.name)+'</span>'+
        '<span class="track"><i style="width:'+p+'%;background:'+nv.c+'"></i></span>'+
        '<span class="niveau" style="background:'+nv.c+'">'+nv.l+'</span>';
      col2.appendChild(row);
    });
    var prio=themeArr.slice(0,2).map(function(o){return o.nm;});
    var tip=elt("p","muted"); tip.style.marginTop="12px";
    tip.innerHTML='🎯 Priorité de révision pour la classe : <b>'+esc(prio.join(" · "))+'</b>.';
    grid.appendChild(col1); grid.appendChild(col2);
    rev.appendChild(grid); rev.appendChild(tip);
  }
  a.appendChild(rev);

  var bar=elt("div","toolbar");
  var again=elt("button","btn primary","↻ Rejouer (mêmes équipes)");
  again.onclick=function(){ var names=game.teams.map(function(t){return t.name;}); var rounds=game.rounds.slice(); var se=game.showExp; newGame(names,rounds,se); nextRound(); };
  var nw=elt("button","btn ghost","⚙ Nouveau réglage"); nw.style.color="var(--panel)";
  nw.onclick=renderSetup;
  bar.appendChild(again); bar.appendChild(elt("span","hud-spacer")); bar.appendChild(nw);
  a.appendChild(bar);
  a.appendChild(foot());

  if(ranked[0]&&ranked[0].score>0){ sWin(); confetti(); }
}

  var grid=elt("div","solo-grid");
  var acts=[
    {id:"sprint",ic:"⚡",tt:"Sciences express",ds:"Physique-chimie et SVT : notions clés"},
    {id:"cartes",ic:"🔬",tt:"Le schéma à légender",ds:"Cellule, circuit, atome : clique la bonne partie"},
    {id:"frise", ic:"📊",tt:"Ranger / ordonner",ds:"Niveaux du vivant, digestion, ères"},
    {id:"dc",    ic:"✅",tt:"Vrai ou faux",ds:"Juge des affirmations scientifiques"},
    {id:"emc",   ic:"🧪",tt:"Expériences & calculs",ds:"Loi d'Ohm, vitesse, masse volumique…"}
  ];
  acts.forEach(function(o){
    var b=elt("button","card mode-card solo-tile");
    b.innerHTML='<div style="font-size:1.8rem">'+o.ic+'</div>'+
      '<div class="tt" style="font-family:var(--disp);font-weight:700;font-size:1.1rem">'+o.tt+'</div>'+
      '<p class="sub">'+o.ds+'</p>';
    b.onclick=function(){ startSolo([o.id]); };
    grid.appendChild(b);
  });
  wrap.appendChild(grid);

  var bar=elt("div","toolbar");
  var back=elt("button","btn ghost small","← Retour"); back.onclick=renderHome;
  bar.appendChild(back);
  wrap.appendChild(bar);
  wrap.appendChild(foot());
  a.appendChild(wrap);
}
function startSolo(rounds){
  initAudio();
  var f=$("#soloName"); var name=(f&&f.value.trim())?f.value.trim():"Toi";
  newGame([name],rounds,true,true);
  nextRound();
}
function renderSoloBilan(){
  stopTimer(); resetIC();
  var t=game.teams[0];
  var a=app(); clear(a);
  var p=t.tot?Math.round(t.ok/t.tot*100):0; var nv=niveau(p);
  var head=elt("div","card center");
  head.innerHTML='<div class="eyebrow">Bilan de ta révision</div>'+
    '<h1 class="headline">'+esc(t.name)+', voici ton résultat</h1>'+
    '<div style="font-family:var(--disp);font-weight:700;font-size:3.4rem;margin:12px 0 0">'+t.score+' <span style="font-size:1.3rem;color:var(--ink-soft)">pts</span></div>'+
    '<div style="margin:10px 0"><span class="niveau" style="background:'+nv.c+';font-size:1rem">Niveau '+nv.l+'</span></div>'+
    '<p class="muted">'+t.ok+' bonnes réponses sur '+t.tot+'  ·  '+p+'% de réussite</p>';
  a.appendChild(head);

  var themeArr=[]; for(var k in t.byTheme){ themeArr.push({nm:k,pc:Math.round(t.byTheme[k].ok/t.byTheme[k].tot*100)}); }
  themeArr.sort(function(x,y){return x.pc-y.pc;});
  if(themeArr.length){
    var rev=elt("div","card");
    rev.innerHTML='<div class="eyebrow">Par thème</div><h2 class="headline" style="font-size:1.5rem">Ce que tu maîtrises, ce qu\'il faut revoir</h2>';
    themeArr.forEach(function(o){
      var row=elt("div","bar-row");
      row.innerHTML='<span class="nm">'+esc(o.nm)+'</span><span class="track"><i style="width:'+o.pc+'%;background:'+barColor(o.pc)+'"></i></span><span class="pc" style="color:'+barColor(o.pc)+'">'+o.pc+'%</span>';
      rev.appendChild(row);
    });
    var weak=themeArr.filter(function(o){return o.pc<70;}).slice(0,3).map(function(o){return o.nm;});
    if(weak.length){ var tip=elt("p","muted"); tip.style.marginTop="12px"; tip.innerHTML='🎯 À retravailler en priorité : <b>'+esc(weak.join(" · "))+'</b>.'; rev.appendChild(tip); }
    a.appendChild(rev);
  }

  var bar=elt("div","toolbar");
  var again=elt("button","btn primary","↻ Recommencer");
  again.onclick=function(){ var name=t.name; var rounds=game.rounds.slice(); newGame([name],rounds,true,true); nextRound(); };
  var menu=elt("button","btn ghost","← Autres révisions"); menu.style.color="var(--panel)";
  menu.onclick=renderSoloMenu;
  bar.appendChild(again); bar.appendChild(elt("span","hud-spacer")); bar.appendChild(menu);
  a.appendChild(bar);
  a.appendChild(foot());
  if(p>=70){ sWin(); confetti(); }
}
